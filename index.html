<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>名古屋の天気</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container my-4">
    <div class="text-center">
    <h1><b>名古屋の天気</b></h1>
    <br><br>
    <button id="getBtn" class="btn btn-primary" >天気を取得</button>


    <div class="container mt-3">
  <div class="row justify-content-center">

    <div class="col-12 col-md-6">
      <div id="result" class="card mx-auto weather-card">
        <div class="card-body text-center">

          <b><p>更新時刻</p></b>
          <p id="time" class="card-text">--:--:--</p>

          <br>

          <b><p>天気</p></b>
          <p id="temp1" class="card-text">--</p>

          <br>

          <b><p>気温</p></b>
          <p id="temp2" class="card-text">--℃</p>

        </div>
      </div>
    </div>

  </div>
</div>


  <br><br><br><br>
  <!-- ページの一番下などに、データの出典を表示する -->
<footer>
  <small>Weather data by <a href="https://open-meteo.com/" style="left: auto;">Open-Meteo.com</a>（CC BY 4.0）</small>
</footer>
</div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
